server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para o webhook n8n — evita CORS no browser
    location /n8n-proxy/ {
        proxy_pass http://n8n-ia-webhook.elainneourives.com.br/;
        proxy_set_header Host n8n-ia-webhook.elainneourives.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA: redireciona tudo para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
